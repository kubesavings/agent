apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "kubesavings-agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubesavings-agent.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.agent.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 300
      template:
        metadata:
          labels:
            {{- include "kubesavings-agent.selectorLabels" . | nindent 12 }}
        spec:
          serviceAccountName: {{ include "kubesavings-agent.serviceAccountName" . }}
          restartPolicy: Never
          automountServiceAccountToken: true
          containers:
            - name: agent
              image: "{{ .Values.agent.image.repository }}:{{ .Values.agent.image.tag }}"
              imagePullPolicy: {{ .Values.agent.image.pullPolicy }}
              securityContext:
                {{- toYaml .Values.agent.securityContext | nindent 16 }}
              resources:
                {{- toYaml .Values.agent.resources | nindent 16 }}
              env:
                - name: KUBESAVINGS_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "kubesavings-agent.secretName" . }}
                      key: {{ .Values.agent.existingSecretApiKeyKey | default "api-key" }}
                - name: KUBESAVINGS_CLUSTER_ID
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "kubesavings-agent.secretName" . }}
                      key: {{ .Values.agent.existingSecretClusterIdKey | default "cluster-id" }}
                - name: KUBESAVINGS_API_ENDPOINT
                  value: {{ .Values.agent.apiEndpoint | quote }}
                {{- if .Values.agent.includeNamespaces }}
                - name: KUBESAVINGS_INCLUDE_NAMESPACES
                  value: {{ .Values.agent.includeNamespaces | quote }}
                {{- end }}
                {{- if .Values.agent.excludeNamespaces }}
                - name: KUBESAVINGS_EXCLUDE_NAMESPACES
                  value: {{ .Values.agent.excludeNamespaces | quote }}
                {{- end }}
                {{- if .Values.agent.cloudProvider }}
                - name: KUBESAVINGS_CLOUD_PROVIDER
                  value: {{ .Values.agent.cloudProvider | quote }}
                {{- end }}
                {{- with .Values.agent.extraEnv }}
                {{- toYaml . | nindent 16 }}
                {{- end }}
