{{- if not .Values.agent.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kubesavings-agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubesavings-agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  api-key: {{ required "agent.apiKey is required when existingSecret is not set" .Values.agent.apiKey | quote }}
  cluster-id: {{ required "agent.clusterId is required when existingSecret is not set" .Values.agent.clusterId | quote }}
{{- end }}
