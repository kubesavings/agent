{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kubesavings-agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubesavings-agent.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "kubesavings-agent.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress
    - Ingress
  ingress: []
  egress:
    # DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Kubernetes API server and HTTPS (KubeSavings API + metrics-server)
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
    # metrics-server default port
    - ports:
        - port: 4443
          protocol: TCP
{{- end }}
